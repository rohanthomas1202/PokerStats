name: PokerStats
options:
  bundleIdPrefix: com.rohanthomas
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

schemes:
  PokerStats:
    build:
      targets:
        PokerStats: all
        PokerStatsUITests: [test]
        PokerStatsTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PokerStatsUITests
        - PokerStatsTests
    archive:
      config: Release

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0

targets:
  PokerStats:
    type: application
    platform: iOS
    sources:
      - path: PokerStats
        excludes:
          - "Preview Content"
      - path: PokerStats/Preview Content
        buildPhase: resources
        type: folder
    resources:
      - path: PokerStats/Resources
        type: folder
    entitlements:
      path: PokerStats/PokerStats.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rohanthomas.PokerStats
    preBuildScripts:
      - name: Generate Secrets.plist from .env
        script: |
          ENV_FILE="${SRCROOT}/.env"
          PLIST_FILE="${SRCROOT}/PokerStats/Resources/Secrets.plist"
          if [ ! -f "$ENV_FILE" ]; then
            echo "warning: .env file not found at $ENV_FILE — creating Secrets.plist with placeholder values"
            cat > "$PLIST_FILE" << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>SUPABASE_URL</key>
            <string>https://YOUR_PROJECT_REF.supabase.co</string>
            <key>SUPABASE_ANON_KEY</key>
            <string>YOUR_ANON_KEY</string>
            <key>GOOGLE_CLIENT_ID</key>
            <string></string>
          </dict>
          </plist>
          PLISTEOF
            exit 0
          fi
          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$PLIST_FILE"
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "$PLIST_FILE"
          echo '<plist version="1.0">' >> "$PLIST_FILE"
          echo '<dict>' >> "$PLIST_FILE"
          while IFS='=' read -r key value; do
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            [ -z "$key" ] && continue
            [[ "$key" == \#* ]] && continue
            echo "  <key>$key</key>" >> "$PLIST_FILE"
            echo "  <string>$value</string>" >> "$PLIST_FILE"
          done < "$ENV_FILE"
          echo '</dict>' >> "$PLIST_FILE"
          echo '</plist>' >> "$PLIST_FILE"
          echo "Generated Secrets.plist from .env"
        outputFiles:
          - $(SRCROOT)/PokerStats/Resources/Secrets.plist
    dependencies:
      - target: PokerStatsWidgets
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.rohanthomas.PokerStats
        PRODUCT_NAME: PokerStats
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

  PokerStatsWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PokerStatsWidgets
      - path: PokerStats/Models/Session.swift
      - path: PokerStats/Models/Hand.swift
      - path: PokerStats/Models/Settings.swift
      - path: PokerStats/Models/Enums.swift
      - path: PokerStats/Models/ComputedStats.swift
      - path: PokerStats/Models/SessionActivityAttributes.swift
      - path: PokerStats/Models/TableConfig.swift
      - path: PokerStats/Services/AppGroupContainer.swift
    entitlements:
      path: PokerStatsWidgets/PokerStatsWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rohanthomas.PokerStats
    info:
      path: PokerStatsWidgets/Info.plist
      properties:
        CFBundleDisplayName: PokerStats
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rohanthomas.PokerStats.PokerStatsWidgets
        PRODUCT_NAME: PokerStatsWidgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES

  PokerStatsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PokerStatsUITests
      - path: fastlane/SnapshotHelper.swift
    dependencies:
      - target: PokerStats
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.rohanthomas.PokerStatsUITests
        TEST_TARGET_NAME: PokerStats

  PokerStatsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PokerStatsTests
    dependencies:
      - target: PokerStats
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.rohanthomas.PokerStatsTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PokerStats.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PokerStats"
        BUNDLE_LOADER: "$(TEST_HOST)"
