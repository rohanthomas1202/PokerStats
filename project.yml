name: PokerStats
options:
  bundleIdPrefix: com.rohanthomas
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  PokerStats:
    type: application
    platform: iOS
    sources:
      - path: PokerStats
        excludes:
          - "Preview Content"
      - path: PokerStats/Preview Content
        buildPhase: resources
        type: folder
    resources:
      - path: PokerStats/Resources
        type: folder
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.rohanthomas.PokerStats
        PRODUCT_NAME: PokerStats
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SWIFT_STRICT_CONCURRENCY: complete

  PokerStatsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PokerStatsTests
    dependencies:
      - target: PokerStats
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.rohanthomas.PokerStatsTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PokerStats.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PokerStats"
        BUNDLE_LOADER: "$(TEST_HOST)"
